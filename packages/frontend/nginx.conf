# ============================================================
#  Jitre — nginx config for the demo container
# ============================================================
# - Serves the Angular SPA from /usr/share/nginx/html
# - Reverse-proxies /api/v1/* and /ws to the backend service
#   resolved via docker-compose service name `backend`
# - SPA fallback to index.html so deep links work after refresh
# - Gzip + immutable cache for hashed assets

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long-cache hashed assets, short-cache index.html so deployments take effect.
  location ~* \.(?:js|css|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
    expires 0;
  }

  # Backend API
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;
    client_max_body_size 30m;  # match backend STORAGE_MAX_FILE_SIZE_MB
  }

  # Socket.IO realtime endpoint
  location /ws/ {
    proxy_pass http://backend:3000/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 1d;
    proxy_send_timeout 1d;
  }

  # Angular SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
