services:
  postgres:
    image: postgres:16-alpine
    container_name: jitre-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jitre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jitre_dev}
      POSTGRES_DB: ${POSTGRES_DB:-jitre}
    volumes:
      - jitre_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jitre} -d ${POSTGRES_DB:-jitre}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jitre-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jitre_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jitre_postgres_data:
  jitre_redis_data:
